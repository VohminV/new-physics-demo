<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Point Zero: Лаборатория Новой Физики</title>
    <style>
        :root {
            --bg: #000000;
            --panel: rgba(10, 15, 20, 0.9);
            --text: #00ff9d;
            --accent: #ff0055;
            --grid: #1a1a1a;
        }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Courier New', monospace; color: var(--text); }
        
        /* Layout */
        #container { position: relative; width: 100vw; height: 100vh; display: flex; }
        canvas { display: block; }
        
        /* Sidebar UI */
        #sidebar {
            width: 350px;
            background: var(--panel);
            border-right: 1px solid var(--text);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            overflow-y: auto;
        }

        h1 { font-size: 18px; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid var(--text); padding-bottom: 10px; }
        h2 { font-size: 14px; margin: 15px 0 5px 0; color: #fff; opacity: 0.8; }

        .control-group { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 4px; }
        label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--text); }
        
        .data-display { font-size: 11px; line-height: 1.6; color: #aaa; }
        .data-value { color: var(--text); font-weight: bold; float: right; }

        button {
            background: transparent; border: 1px solid var(--accent); color: var(--accent);
            padding: 10px; width: 100%; cursor: pointer; font-family: inherit; font-weight: bold;
            text-transform: uppercase; transition: 0.2s; margin-top: 5px;
        }
        button:hover { background: var(--accent); color: #fff; box-shadow: 0 0 15px var(--accent); }

        /* Graph Canvas inside sidebar */
        #graphCanvas { width: 100%; height: 100px; background: #000; border: 1px solid #333; margin-top: 5px; }

        .legend { font-size: 10px; margin-top: 5px; display: flex; gap: 10px; }
        .dot { width: 8px; height: 8px; display: inline-block; border-radius: 50%; }
    </style>
</head>
<body>

<div id="container">
    <div id="sidebar">
        <h1>Point Zero Lab</h1>
        <div style="font-size: 11px; color: #888;">Теория: Эмерджентная геометрия без гравитации.</div>

        <div class="control-group">
            <h2>Параметры Вселенной</h2>
            <label>Агенты: <span id="val-count">400</span></label>
            <input type="range" id="inp-count" min="50" max="1000" value="400">
            
            <label>Диффузия поля: <span id="val-diff">0.94</span></label>
            <input type="range" id="inp-diff" min="0.80" max="0.99" step="0.001" value="0.94">
            
            <label>Чувствительность: <span id="val-sense">0.08</span></label>
            <input type="range" id="inp-sense" min="0.01" max="0.3" step="0.001" value="0.08">
            
            <label>Жесткость (Геометрия): <span id="val-stiff">0.05</span></label>
            <input type="range" id="inp-stiff" min="0.01" max="0.2" step="0.001" value="0.05">
        </div>

        <div class="control-group">
            <h2>Телеметрия (Доказательство)</h2>
            <div class="data-display">
                Энтропия системы: <span id="stat-entropy" class="data-value">0.00</span><br>
                Кинетическая энергия: <span id="stat-energy" class="data-value">0.00</span><br>
                Коэф. кластеризации: <span id="stat-cluster" class="data-value">0.00</span><br>
                FPS: <span id="stat-fps" class="data-value">0</span>
            </div>
            <canvas id="graphCanvas"></canvas>
            <div class="legend">
                <span><span class="dot" style="background:#00ff9d"></span> Энергия</span>
                <span><span class="dot" style="background:#ff0055"></span> Энтропия</span>
            </div>
        </div>

        <button id="btn-reset">Перезапуск Сингулярности</button>
        <button id="btn-perturb">Внешнее Возмущение</button>
        
        <div style="margin-top: auto; font-size: 10px; color: #555; border-top: 1px solid #333; padding-top: 10px;">
            Статус: <span style="color:#0f0">● Активно</span><br>
            Модель: Reaction-Diffusion + Geometric Constraints<br>
            Гравитация: OFF
        </div>
    </div>
    <canvas id="simCanvas"></canvas>
</div>

<script>
/**
 * POINT ZERO ENGINE
 * Реализация новой физики:
 * 1. Пространство - дискретное поле концентраций.
 * 2. Время - дискретные шаги.
 * 3. Силы отсутствуют. Есть только градиенты и геометрические ограничения.
 */

const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d', { alpha: false });
const graphCanvas = document.getElementById('graphCanvas');
const graphCtx = graphCanvas.getContext('2d');

// Конфигурация
const config = {
    particleCount: 400,
    diffusion: 0.94,
    sensitivity: 0.08,
    stiffness: 0.05,
    gridScale: 5, // Разрешение поля
    decay: 0.02
};

let width, height, cols, rows;
let field; // Float32Array для производительности
let particles = [];
let history = { energy: [], entropy: [] };
let lastTime = 0;
let frameCount = 0;

// Инициализация
function resize() {
    const sidebarWidth = document.getElementById('sidebar').offsetWidth;
    width = window.innerWidth - sidebarWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    
    cols = Math.ceil(width / config.gridScale);
    rows = Math.ceil(height / config.gridScale);
    
    field = new Float32Array(cols * rows).fill(0);
    
    graphCanvas.width = document.getElementById('sidebar').offsetWidth - 40;
    graphCanvas.height = 100;
}

class Particle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 1.5 + 0.5;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.radius = 3;
        // Цвет зависит от начальной скорости (визуализация разнообразия)
        const hue = 140 + (speed * 20); 
        this.color = `hsl(${hue}, 100%, 60%)`;
    }

    update() {
        // 1. Восприятие поля (Градиентный спуск/подъем)
        // Агент сравнивает концентрацию слева и справа от вектора движения
        const sensorDist = 12;
        const angle = Math.atan2(this.vy, this.vx);
        
        const lx = this.x + Math.cos(angle - 0.6) * sensorDist;
        const ly = this.y + Math.sin(angle - 0.6) * sensorDist;
        const rx = this.x + Math.cos(angle + 0.6) * sensorDist;
        const ry = this.y + Math.sin(angle + 0.6) * sensorDist;

        const valL = this.getField(lx, ly);
        const valR = this.getField(rx, ry);
        const valC = this.getField(this.x, this.y);

        // Логика поведения: идти туда, где больше "информации" (концентрации)
        let turn = 0;
        if (valL > valR && valL > valC) turn = -config.sensitivity;
        else if (valR > valL && valR > valC) turn = config.sensitivity;
        else if (valC < valL && valC < valR) turn = (Math.random() - 0.5) * 0.5; // Блуждание в пустоте

        // Поворот вектора скорости
        const speed = Math.sqrt(this.vx*this.vx + this.vy*this.vy);
        const newAngle = angle + turn;
        this.vx = Math.cos(newAngle) * speed;
        this.vy = Math.sin(newAngle) * speed;

        // 2. Геометрическое ограничение (Столкновения)
        // Упрощенная проверка соседей (для демо O(N^2) допустимо при N<1000)
        // В продакшене здесь был бы Spatial Hash Grid
        for (let other of particles) {
            if (other === this) continue;
            const dx = this.x - other.x;
            const dy = this.y - other.y;
            const distSq = dx*dx + dy*dy;
            const minDist = (this.radius + other.radius) * 1.5; // Буфер
            
            if (distSq < minDist * minDist && distSq > 0) {
                const dist = Math.sqrt(distSq);
                const overlap = minDist - dist;
                const force = overlap * config.stiffness;
                const nx = dx / dist;
                const ny = dy / dist;
                
                this.x += nx * force;
                this.y += ny * force;
                other.x -= nx * force;
                other.y -= ny * force;
                
                // Обмен импульсом (упрощенно)
                this.vx += nx * 0.1;
                this.vy += ny * 0.1;
                other.vx -= nx * 0.1;
                other.vy -= ny * 0.1;
            }
        }

        // 3. Движение
        this.x += this.vx;
        this.y += this.vy;

        // Тороидальная топология (мир без границ)
        if (this.x < 0) this.x = width;
        if (this.x > width) this.x = 0;
        if (this.y < 0) this.y = height;
        if (this.y > height) this.y = 0;

        // 4. Генерация поля (Оставление следа)
        this.deposit();
    }

    getField(x, y) {
        if (x < 0 || x >= width || y < 0 || y >= height) return 0;
        const c = Math.floor(x / config.gridScale);
        const r = Math.floor(y / config.gridScale);
        return field[r * cols + c];
    }

    deposit() {
        const c = Math.floor(this.x / config.gridScale);
        const r = Math.floor(this.y / config.gridScale);
        if (c >= 0 && c < cols && r >= 0 && r < rows) {
            field[r * cols + c] = Math.min(1.0, field[r * cols + c] + 0.6);
        }
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

// Физическое ядро: Обновление поля (Диффузия + Затухание)
function updateField() {
    const nextField = new Float32Array(cols * rows);
    const len = field.length;
    
    // Оптимизированный проход
    for (let i = 0; i < len; i++) {
        let val = field[i];
        
        // Затухание
        val *= config.diffusion;
        
        // Диффузия (соседи: верх, низ, лево, право)
        const r = Math.floor(i / cols);
        const c = i % cols;
        
        let sum = 0;
        let count = 0;
        
        if (r > 0) { sum += field[i - cols]; count++; }
        if (r < rows - 1) { sum += field[i + cols]; count++; }
        if (c > 0) { sum += field[i - 1]; count++; }
        if (c < cols - 1) { sum += field[i + 1]; count++; }
        
        if (count > 0) {
            val = val * 0.7 + (sum / count) * 0.3;
        }
        
        nextField[i] = val;
    }
    field = nextField;
}

function drawField() {
    // Прямая манипуляция пикселями была бы быстрее, но fillRect проще для понимания кода
    // Для оптимизации рисуем только если значение > порога
    for (let i = 0; i < field.length; i++) {
        const val = field[i];
        if (val > 0.02) {
            const c = i % cols;
            const r = Math.floor(i / cols);
            const x = c * config.gridScale;
            const y = r * config.gridScale;
            
            // Цветовая карта: от темно-синего к ярко-зеленому
            const g = Math.floor(val * 255);
            const b = Math.floor(val * 100);
            ctx.fillStyle = `rgba(0, ${g}, ${b}, ${val})`;
            ctx.fillRect(x, y, config.gridScale, config.gridScale);
        }
    }
}

// Аналитика и Телеметрия
function calculateMetrics() {
    let totalEnergy = 0;
    let totalConcentration = 0;
    let concentrationSqSum = 0;
    
    particles.forEach(p => {
        totalEnergy += (p.vx*p.vx + p.vy*p.vy);
    });
    
    for (let val of field) {
        totalConcentration += val;
        concentrationSqSum += val * val;
    }
    
    // Энтропия Шеннона (упрощенно через дисперсию концентрации)
    // Низкая энтропия = четкие структуры, Высокая = шум
    const mean = totalConcentration / field.length;
    const variance = (concentrationSqSum / field.length) - (mean * mean);
    const entropy = Math.max(0, variance * 100); // Нормализация
    
    // Кластеризация (среднее расстояние до ближайшего соседа)
    // Упрощенно: чем выше плотность локально, тем выше коэффициент
    
    return { energy: totalEnergy / particles.length, entropy };
}

function drawGraph(metrics) {
    history.energy.push(metrics.energy);
    history.entropy.push(metrics.entropy);
    if (history.energy.length > 100) {
        history.energy.shift();
        history.entropy.shift();
    }
    
    const w = graphCanvas.width;
    const h = graphCanvas.height;
    graphCtx.clearRect(0, 0, w, h);
    
    // Рисуем энергию (зеленый)
    graphCtx.strokeStyle = '#00ff9d';
    graphCtx.lineWidth = 2;
    graphCtx.beginPath();
    const maxE = Math.max(...history.energy, 10);
    history.energy.forEach((v, i) => {
        const x = (i / 100) * w;
        const y = h - (v / maxE) * h;
        if (i===0) graphCtx.moveTo(x, y); else graphCtx.lineTo(x, y);
    });
    graphCtx.stroke();
    
    // Рисуем энтропию (красный)
    graphCtx.strokeStyle = '#ff0055';
    graphCtx.lineWidth = 2;
    graphCtx.beginPath();
    const maxS = Math.max(...history.entropy, 1);
    history.entropy.forEach((v, i) => {
        const x = (i / 100) * w;
        const y = h - (v / maxS) * h;
        if (i===0) graphCtx.moveTo(x, y); else graphCtx.lineTo(x, y);
    });
    graphCtx.stroke();
}

// Главный цикл
function loop(timestamp) {
    // Очистка с эффектом шлейфа
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillRect(0, 0, width, height);
    
    // Шаг физики
    updateField();
    drawField();
    
    particles.forEach(p => {
        p.update();
        p.draw();
    });
    
    // Сбор данных каждые 10 кадров для экономии ресурсов
    if (frameCount % 10 === 0) {
        const metrics = calculateMetrics();
        document.getElementById('stat-energy').innerText = metrics.energy.toFixed(2);
        document.getElementById('stat-entropy').innerText = metrics.entropy.toFixed(2);
        // Псевдо-кластеризация (обратная пропорциональна энтропии для демо)
        document.getElementById('stat-cluster').innerText = (1 / (metrics.entropy + 0.1)).toFixed(2);
        drawGraph(metrics);
    }
    
    // FPS
    if (timestamp - lastTime >= 1000) {
        document.getElementById('stat-fps').innerText = frameCount;
        frameCount = 0;
        lastTime = timestamp;
    }
    frameCount++;
    
    requestAnimationFrame(loop);
}

function init() {
    resize();
    particles = [];
    for (let i = 0; i < config.particleCount; i++) {
        particles.push(new Particle(Math.random() * width, Math.random() * height));
    }
    field.fill(0);
    history = { energy: [], entropy: [] };
}

// Event Listeners
document.getElementById('inp-count').oninput = (e) => {
    config.particleCount = parseInt(e.target.value);
    document.getElementById('val-count').innerText = config.particleCount;
    // Пересоздание при сильном изменении
    if (Math.abs(particles.length - config.particleCount) > 50) init();
};
document.getElementById('inp-diff').oninput = (e) => {
    config.diffusion = parseFloat(e.target.value);
    document.getElementById('val-diff').innerText = config.diffusion;
};
document.getElementById('inp-sense').oninput = (e) => {
    config.sensitivity = parseFloat(e.target.value);
    document.getElementById('val-sense').innerText = config.sensitivity;
};
document.getElementById('inp-stiff').oninput = (e) => {
    config.stiffness = parseFloat(e.target.value);
    document.getElementById('val-stiff').innerText = config.stiffness;
};

document.getElementById('btn-reset').onclick = init;

document.getElementById('btn-perturb').onclick = () => {
    // Добавляем случайные всплески в поле
    for(let i=0; i<10; i++) {
        const cx = Math.random() * width;
        const cy = Math.random() * height;
        const r = 30;
        const cStart = Math.floor((cx-r)/config.gridScale);
        const cEnd = Math.floor((cx+r)/config.gridScale);
        const rStart = Math.floor((cy-r)/config.gridScale);
        const rEnd = Math.floor((cy+r)/config.gridScale);
        
        for(let y=rStart; y<=rEnd; y++) {
            for(let x=cStart; x<=cEnd; x++) {
                if(x>=0 && x<cols && y>=0 && y<rows) {
                    field[y*cols+x] += 0.8;
                }
            }
        }
    }
    // Толчок частицам
    particles.forEach(p => {
        p.vx += (Math.random()-0.5)*5;
        p.vy += (Math.random()-0.5)*5;
    });
};

window.addEventListener('resize', resize);
window.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    
    // Клик создает мощный источник поля
    const r = 40;
    const cStart = Math.floor((mx-r)/config.gridScale);
    const cEnd = Math.floor((mx+r)/config.gridScale);
    const rStart = Math.floor((my-r)/config.gridScale);
    const rEnd = Math.floor((my+r)/config.gridScale);
    
    for(let y=rStart; y<=rEnd; y++) {
        for(let x=cStart; x<=cEnd; x++) {
            if(x>=0 && x<cols && y>=0 && y<rows) {
                const dist = Math.sqrt(Math.pow(x*config.gridScale-mx, 2) + Math.pow(y*config.gridScale-my, 2));
                if(dist < r) field[y*cols+x] += 1.0;
            }
        }
    }
});

// Start
init();
requestAnimationFrame(loop);

</script>
</body>
</html>
